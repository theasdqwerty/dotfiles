conky.config = {
    -- === РАЗМЕР И ПОЗИЦИЯ ===
    alignment = 'top_right',
    gap_x = 0,
    gap_y = 0,
    maximum_width = 380,
    minimum_height = 0,

    -- === ОБНОВЛЕНИЕ ===
    update_interval = 2,

    -- === ОКНО И ПРОЗРАЧНОСТЬ ===
    own_window = true,
    own_window_type = 'normal',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- === ШРИФТЫ ===
    use_xft = true,
    font = 'JetBrains Mono:size=11',

    -- === ЦВЕТА ===
    default_color = 'white',
    color0 = '#89b4fa',
    color1 = '#a6e3a1',
    color2 = '#f38ba8',

    -- === ОФОРМЛЕНИЕ ===
    background = false,
    double_buffer = true,
    draw_borders = false,
    draw_shades = false,
    draw_outline = false,

    -- === ПРОИЗВОДИТЕЛЬНОСТЬ ===
    cpu_avg_samples = 2,
    net_avg_samples = 2,
    no_buffers = true,
};

conky.text = [[
${color0}${font JetBrains Mono:bold:size=14}${time %H:%M}${font}${color}
${color1}${font JetBrains Mono:size=9}${time %d %B %Y}${font}${color}
${color1}${font JetBrains Mono:size=9}${time %A}${font}${color}
${voffset 5}

${color0}ДИСК (/)${color}
${color1}${fs_used /}/${fs_size /}${color}
${fs_bar 12,360 /}

${color0}RAM${color}
${color1}$mem / $memmax${color}
${membar 12,360}

${color0}CPU${color}
${color1}$cpu%${color}
${cpubar 12,360}

${color0}ТЕМПЕРАТУРЫ${color}
${color1}CPU:${color} ${hwmon 0 temp 1}°C${goto 280}${color1}GPU:${color} ${exec nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader}°C
${voffset 2}

${color0}СЕТЬ${color}
${if_up amn0}${color #66BF60}● VPN${color}${else}${color #FF6640}● VPN${color}${endif}
${color1}Загрузка:${color} ${downspeedf eno1} KB/s
${downspeedgraph eno1 12,360 008800 00ff00}
${color1}Отдача:${color} ${upspeedf eno1} KB/s
${upspeedgraph eno1 12,360 880000 ff0000}
${color1}Всего скачано:${color} ${totaldown eno1}
${color1}Всего отправлено:${color} ${totalup eno1}

${color0}ПРОЦЕССЫ (CPU)${color}
${color1}${top name 1}${goto 280}${top cpu 1}%
${top name 2}${goto 280}${top cpu 2}%
${top name 3}${goto 280}${top cpu 3}%
${top name 4}${goto 280}${top cpu 4}%

${color0}ПРОЦЕССЫ (RAM)${color}
${color1}${top_mem name 1}${goto 280}${top_mem mem 1}
${top_mem name 2}${goto 280}${top_mem mem 2}
${top_mem name 3}${goto 280}${top_mem mem 3}
${top_mem name 4}${goto 280}${top_mem mem 4}
]];
