# tmux config by qwerty
# --- Префикс: Ctrl+A (вместо Ctrl+B) ---
unbind C-b                    # Отключаем старый префикс
set -g prefix C-a             # Устанавливаем новый
bind C-a send-prefix          # Чтобы можно было отправить C-a внутрь вложенной сессии

# --- История и поведение ---
set -g history-limit 100000
set -g allow-rename off

# --- Режим перемещения (как в vi) ---
set-window-option -g mode-keys vi

# --- Логирование ---
run-shell /opt/tmux-logging/logging.tmux

# Включить поддержку мыши (очень удобно)
set -g mouse on

# Нумерация окон и панелей с 1 (а не с 0)
set -g base-index 1
setw -g pane-base-index 1

# Перезагрузка конфига (Ctrl+A + r)
bind r source-file ~/.tmux.conf \; display "✅ Config reloaded!"

# Удобное изменение размера панелей (Ctrl+A + стрелки)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Быстрое создание новых окон и панелей
bind v split-window -h      # Ctrl+A + v  → вертикальный сплит
bind s split-window -v      # Ctrl+A + s  → горизонтальный сплит
bind c new-window           # Ctrl+A + c  → новое окно

# Переключение между окнами через Alt + стрелки (не конфликтует с префиксом)
bind -n M-Left  previous-window
bind -n M-Right next-window

# Переключение между панелями без префикса (Alt + hjkl)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Удобный выход из режима копирования (Enter вместо q)
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel
